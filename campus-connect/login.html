<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Campus Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* ── Auth Page Layout ───────────────────────────────── */
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 440px;
      padding: 44px 40px;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--white);
      text-align: center;
      margin-bottom: 6px;
      text-decoration: none;
      display: block;
    }
    .auth-logo span { color: var(--accent); }
    .auth-subtitle {
      text-align: center;
      color: var(--muted);
      font-size: .875rem;
      margin-bottom: 32px;
    }
    .auth-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--white);
      text-align: center;
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 7px;
    }
    .form-group input {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-size: .95rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .25s, box-shadow .25s;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,.15);
    }
    .form-group input::placeholder { color: var(--muted); }
    .btn-auth {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .2s;
    }
    .btn-auth:hover { opacity: .88; transform: translateY(-1px); }
    .btn-auth:active { transform: translateY(0); }
    .btn-auth:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .auth-switch {
      text-align: center;
      margin-top: 22px;
      font-size: .875rem;
      color: var(--muted);
    }
    .auth-switch a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .auth-switch a:hover { text-decoration: underline; }
    .auth-msg {
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .875rem;
      margin-bottom: 18px;
      display: none;
    }
    .auth-msg.error   { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.35); color: #fca5a5; }
    .auth-msg.success { background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.35); color: #86efac; }
    .auth-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--muted); font-size: .8rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <a class="auth-logo" href="index.html">Campus<span>Connect</span></a>
      <p class="auth-subtitle">pccnet — Your Campus, Connected</p>

      <h2 class="auth-title">Welcome Back</h2>

      <div class="auth-msg" id="auth-msg"></div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn-auth" id="btn-login">Log In</button>

      <div class="auth-divider">or</div>

      <div class="auth-switch">
        Don't have an account? <a href="signup.html">Sign up here</a>
      </div>

    </div>
  </div>

  <script>
    // ── helpers ──────────────────────────────────────────────
    function showMsg(text, type) {
      const el = document.getElementById('auth-msg');
      el.textContent = text;
      el.className = 'auth-msg ' + type;
      el.style.display = 'block';
    }

    // ── submit ───────────────────────────────────────────────
    document.getElementById('btn-login').addEventListener('click', function () {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showMsg('Please fill in all fields.', 'error');
        return;
      }

      const btn = this;
      btn.disabled = true;
      btn.textContent = 'Logging in…';

      const fd = new FormData();
      fd.append('email',    email);
      fd.append('password', password);

      fetch('php/login.php', { method: 'POST', body: fd })
        .then(r => r.json())
        .then(data => {
          if (data.ok) {
            // Persist lightweight session info in localStorage for nav display
            localStorage.setItem('cc_user', JSON.stringify({
              name:   data.name,
              role:   data.role,
              strand: data.strand
            }));
            showMsg('Login successful! Redirecting…', 'success');
            setTimeout(() => {
              if (data.role === 'admin') {
                window.location.href = 'admin/index.html';
              } else {
                window.location.href = 'index.html';
              }
            }, 800);
          } else {
            showMsg(data.msg, 'error');
            btn.disabled = false;
            btn.textContent = 'Log In';
          }
        })
        .catch(() => {
          showMsg('Server error. Make sure XAMPP is running.', 'error');
          btn.disabled = false;
          btn.textContent = 'Log In';
        });
    });

    // Allow Enter key
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });

    // Redirect if already logged in
    const ccUser = localStorage.getItem('cc_user');
    if (ccUser) {
      try {
        const u = JSON.parse(ccUser);
        if (u.role === 'admin') window.location.href = 'admin/index.html';
        else window.location.href = 'index.html';
      } catch(e) {}
    }
  </script>

</body>
</html>
